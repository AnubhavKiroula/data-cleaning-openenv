name: Lint

on: [push, pull_request]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          pip install black flake8 isort pylint

      - name: Check formatting with black
        run: black --check backend/ || true

      - name: Check style with flake8
        run: flake8 backend/ --max-line-length=100 --extend-ignore=E203 || true

      - name: Check imports with isort
        run: isort --check-only backend/ || true

      - name: Static analysis with pylint
        run: pylint backend/ --disable=missing-docstring,C0115,C0116 || true

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint || true

      - name: Run Prettier check
        run: cd frontend && npm run format:check || true

      - name: Run TypeScript type check
        run: cd frontend && npx tsc --noEmit || true
