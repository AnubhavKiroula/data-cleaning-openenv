version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: data_cleaning
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d data_cleaning"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/data_cleaning
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      POSTGRES_DB: data_cleaning
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A backend.config.celery_config:celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/data_cleaning
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      POSTGRES_DB: data_cleaning
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
