# Render Blueprint for data-cleaning-openenv
# Deploy this via: https://dashboard.render.com/blueprint
#
# Prerequisites:
#   1. GitHub repo connected to Render
#   2. Set environment variable HF_TOKEN in Render dashboard
#   3. Set environment variable JWT_SECRET in Render dashboard
#
# This blueprint creates:
#   - PostgreSQL database
#   - Redis cache
#   - Backend FastAPI service
#   - Celery worker
#
# Frontend is deployed separately (see DEPLOYMENT.md)

services:
  # PostgreSQL Database
  - type: pserv
    name: data-cleaning-db
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: data_cleaning
      - key: POSTGRES_USER
        value: admin
      - key: POSTGRES_PASSWORD
        generateValue: true

  # Redis Cache
  - type: pserv
    name: data-cleaning-redis
    ipAllowList: []
    plan: starter

  # Backend FastAPI Service
  - type: web
    name: data-cleaning-backend
    runtime: docker
    repo: https://github.com/AnubhavKiroula/data-cleaning-openenv
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        value: postgresql://admin:${data-cleaning-db.POSTGRES_PASSWORD}@${data-cleaning-db.INTERNAL_HOST}/data_cleaning
      - key: REDIS_URL
        value: redis://${data-cleaning-redis.INTERNAL_HOST}:6379/0
      - key: JWT_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: API_BASE_URL
        value: https://api-inference.huggingface.co/v1
      - key: MODEL_NAME
        value: meta-llama/Llama-3.2-1B-Instruct
      - key: HF_TOKEN
        sync: false
    numInstances: 1
    healthCheckPath: /health

  # Celery Worker
  - type: worker
    name: data-cleaning-celery
    runtime: docker
    repo: https://github.com/AnubhavKiroula/data-cleaning-openenv
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A backend.tasks worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        value: postgresql://admin:${data-cleaning-db.POSTGRES_PASSWORD}@${data-cleaning-db.INTERNAL_HOST}/data_cleaning
      - key: REDIS_URL
        value: redis://${data-cleaning-redis.INTERNAL_HOST}:6379/0
      - key: JWT_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
